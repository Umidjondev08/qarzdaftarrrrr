<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qarz Daftari Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ═══════════════════════════════════════
    DESIGN TOKENS — DARK MODE (default)
═══════════════════════════════════════ */
:root {
  --bg-base:    #08141e;
  --bg-mid:     #0c1f2e;
  --bg-top:     #0f2535;
  --surface:    rgba(255,255,255,0.04);
  --surface-hov:rgba(255,255,255,0.07);
  --border:     rgba(255,255,255,0.07);
  --border-2:   rgba(255,255,255,0.12);
  --accent:     #00d2a0;
  --accent-2:   #00b386;
  --accent-dim: rgba(0,210,160,0.12);
  --accent-glow:rgba(0,210,160,0.25);
  --red:        #ff4f4f;
  --red-dim:    rgba(255,79,79,0.1);
  --tg:         #229ED9;
  --tg-dim:     rgba(34,158,217,0.1);
  --warn:       #ffb347;
  --text:       #eaf0f6;
  --text-2:     rgba(255,255,255,0.55);
  --text-3:     rgba(255,255,255,0.3);
  --input-bg:   rgba(255,255,255,0.05);
  --input-bd:   rgba(255,255,255,0.1);
  --item-bg:    rgba(255,255,255,0.03);
  --item-bd:    rgba(255,255,255,0.06);
  --sep:        rgba(255,255,255,0.05);
  --shadow:     0 8px 32px rgba(0,0,0,0.4);
  --shadow-sm:  0 2px 12px rgba(0,0,0,0.25);
  --sk1: rgba(255,255,255,0.04);
  --sk2: rgba(255,255,255,0.09);
  --modal-bg:   rgba(8,20,30,0.92);
}

/* ═══════════════════════════════════════
    LIGHT MODE
═══════════════════════════════════════ */
body.light {
  --bg-base:    #eaf1f8;
  --bg-mid:     #dce9f4;
  --bg-top:     #cfe0ef;
  --surface:    rgba(255,255,255,0.75);
  --surface-hov:rgba(255,255,255,0.95);
  --border:     rgba(0,50,100,0.08);
  --border-2:   rgba(0,50,100,0.14);
  --text:       #0f2030;
  --text-2:     rgba(15,32,48,0.55);
  --text-3:     rgba(15,32,48,0.35);
  --input-bg:   rgba(255,255,255,0.85);
  --input-bd:   rgba(0,50,100,0.14);
  --item-bg:    rgba(255,255,255,0.65);
  --item-bd:    rgba(0,50,100,0.08);
  --sep:        rgba(0,50,100,0.07);
  --shadow:     0 8px 32px rgba(0,80,160,0.1);
  --shadow-sm:  0 2px 12px rgba(0,80,160,0.07);
  --sk1: rgba(0,0,0,0.05);
  --sk2: rgba(0,0,0,0.1);
  --modal-bg:   rgba(220,233,244,0.96);
}

/* ═══════════════════════════════════════
    RESET & BASE
═══════════════════════════════════════ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }

body {
  min-height: 100vh;
  background: linear-gradient(145deg, var(--bg-base) 0%, var(--bg-mid) 55%, var(--bg-top) 100%);
  font-family: 'Inter', sans-serif;
  color: var(--text);
  padding: 24px 16px 100px;
  display: flex; justify-content: center;
  transition: background 0.45s ease, color 0.45s ease;
}

.container { width: 100%; max-width: 520px; }

/* ═══════════════════════════════════════
    HEADER
═══════════════════════════════════════ */
.header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 28px; gap: 12px;
}
.logo { display: flex; flex-direction: column; }
.logo h1 {
  font-family: 'Syne', sans-serif; font-size: 34px; font-weight: 900;
  color: var(--text); line-height: 1; letter-spacing: -1px;
}
.logo h1 span { color: var(--accent); }
.logo-sub { font-size: 10px; color: var(--text-3); letter-spacing: 0.15em; text-transform: uppercase; margin-top: 3px; }

.header-actions { display: flex; align-items: center; gap: 8px; }

.icon-btn {
  width: 40px; height: 40px; border-radius: 14px;
  border: 1px solid var(--border-2);
  background: var(--surface);
  color: var(--text-2);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 15px; transition: all 0.25s; flex-shrink: 0;
  backdrop-filter: blur(10px);
}
.icon-btn:hover { background: var(--surface-hov); color: var(--accent); border-color: var(--accent); transform: translateY(-1px); }

.conn-pill {
  display: flex; align-items: center; gap: 6px;
  font-size: 10px; color: var(--text-3); font-weight: 600; letter-spacing: 0.04em;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 50px; padding: 7px 13px;
  backdrop-filter: blur(10px);
  transition: background 0.4s, border-color 0.4s;
}
.conn-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #555; transition: all 0.4s;
}
.conn-dot.online  { background: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }
.conn-dot.offline { background: var(--red); }
.conn-dot.loading { background: var(--warn); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }

/* ═══════════════════════════════════════
    STATS
═══════════════════════════════════════ */
.stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 18px; padding: 14px 12px;
  backdrop-filter: blur(10px);
  transition: transform 0.2s, background 0.4s, box-shadow 0.2s;
  cursor: default;
}
.stat-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-sm); background: var(--surface-hov); }
.stat-icon { font-size: 16px; margin-bottom: 8px; }
.stat-label { font-size: 9px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px; font-weight: 600; }
.stat-value { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
.stat-value.green { color: var(--accent); }
.stat-value.red   { color: var(--red); }

/* ═══════════════════════════════════════
    SEARCH & EXPORT
═══════════════════════════════════════ */
.search-row { display: flex; gap: 10px; margin-bottom: 16px; }
.search-wrap { position: relative; flex: 1; }
.search-wrap i {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  color: var(--text-3); font-size: 13px; pointer-events: none;
}
.search-input {
  width: 100%; background: var(--surface);
  border: 1px solid var(--border-2); border-radius: 14px;
  padding: 13px 14px 13px 38px;
  color: var(--text); outline: none; font-family: inherit; font-size: 14px;
  backdrop-filter: blur(10px);
  transition: border-color 0.2s, background 0.4s;
}
.search-input:focus { border-color: var(--accent); background: var(--surface-hov); }
.search-input::placeholder { color: var(--text-3); }

/* ═══════════════════════════════════════
    FILTER TABS
═══════════════════════════════════════ */
.filter-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
.tab-btn {
  flex: 1; padding: 9px 6px; border-radius: 12px;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--text-2); font-size: 11px; font-weight: 700; font-family: inherit;
  cursor: pointer; transition: all 0.2s; letter-spacing: 0.02em;
}
.tab-btn.active { background: var(--accent); color: #08141e; border-color: var(--accent); }
.tab-btn:not(.active):hover { border-color: var(--accent); color: var(--accent); }

/* ═══════════════════════════════════════
    FORM CARD
═══════════════════════════════════════ */
.form-card {
  background: var(--surface); border: 1px solid var(--border-2);
  border-radius: 24px; padding: 20px; margin-bottom: 20px;
  backdrop-filter: blur(12px);
  box-shadow: var(--shadow-sm);
  transition: background 0.4s, border-color 0.4s;
}
.form-title {
  font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
  color: var(--text-2); text-transform: uppercase; letter-spacing: 0.1em;
  margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between;
}
.form-title div { display: flex; align-items: center; gap: 8px; }
.form-title i { color: var(--accent); }

.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.field-group { position: relative; }
.field-label {
  font-size: 10px; font-weight: 600; color: var(--text-3);
  text-transform: uppercase; letter-spacing: 0.08em;
  margin-bottom: 5px; display: block;
}
.field-input, .field-select {
  width: 100%; background: var(--input-bg);
  border: 1px solid var(--input-bd); border-radius: 12px;
  padding: 12px 14px; color: var(--text); font-family: inherit;
  font-size: 14px; outline: none;
  transition: border-color 0.2s, background 0.4s, box-shadow 0.2s;
}
.field-select option { background: var(--bg-mid); color: var(--text); }
.field-input:focus, .field-select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-dim);
}
.field-input::placeholder { color: var(--text-3); }
.field-full { margin-bottom: 10px; }

.btn-row { display: flex; gap: 10px; margin-top: 14px; }
.btn-primary {
  flex: 1; background: var(--accent); color: #08141e;
  border: none; border-radius: 13px; padding: 15px;
  font-family: 'Syne', sans-serif; font-weight: 800; font-size: 14px;
  cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  letter-spacing: 0.03em;
}
.btn-primary:hover { background: var(--accent-2); transform: translateY(-2px); box-shadow: 0 6px 20px var(--accent-glow); }
.btn-primary:active { transform: translateY(0); }
.btn-primary:disabled { opacity: 0.55; cursor: not-allowed; transform: none; box-shadow: none; }

.btn-cancel {
  background: var(--surface-hov); color: var(--text-2);
  border: 1px solid var(--border-2); border-radius: 13px; padding: 15px 18px;
  font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px;
  cursor: pointer; transition: all 0.2s;
}
.btn-cancel:hover { color: var(--red); border-color: var(--red); }

/* ═══════════════════════════════════════
    DEBT LIST ITEMS
═══════════════════════════════════════ */
.list-section-label {
  font-size: 10px; color: var(--text-3); text-transform: uppercase;
  letter-spacing: 0.12em; font-weight: 700; margin-bottom: 10px; padding-left: 4px;
}

.debt-item {
  background: var(--item-bg); border: 1px solid var(--item-bd);
  border-radius: 20px; padding: 15px; margin-bottom: 10px;
  transition: background 0.3s, border-color 0.3s, transform 0.2s, box-shadow 0.2s;
  animation: fadeUp 0.3s ease both;
  position: relative; overflow: hidden;
}
.debt-item::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px; background: var(--accent); border-radius: 3px 0 0 3px;
  opacity: 0; transition: opacity 0.3s;
}
.debt-item:hover { background: var(--surface-hov); transform: translateX(3px); box-shadow: var(--shadow-sm); }
.debt-item:hover::before { opacity: 1; }
.debt-item.paid-item { opacity: 0.45; }
.debt-item.paid-item::before { background: var(--text-3); }

.debt-item.type-take::before { background: var(--red); }

@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }

.item-top { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.avatar {
  width: 46px; height: 46px; border-radius: 16px;
  background: var(--accent-dim); display: flex; align-items: center;
  justify-content: center; color: var(--accent); font-weight: 900;
  font-family: 'Syne'; font-size: 14px; flex-shrink: 0;
  border: 1px solid rgba(0,210,160,0.2);
  transition: background 0.3s;
}
.debt-item.type-take .avatar {
  background: var(--red-dim); color: var(--red); border-color: rgba(255,79,79,0.2);
}
.debt-item:hover .avatar { background: rgba(0,210,160,0.2); }

.debt-meta { flex: 1; min-width: 0; }
.debt-name {
  font-weight: 700; font-size: 15px; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  line-height: 1.2;
}
.debt-phone { font-size: 12px; color: var(--accent); margin-top: 2px; font-weight: 500; }
.debt-item.type-take .debt-phone { color: var(--red); }
.debt-time { font-size: 10px; color: var(--text-3); margin-top: 3px; }
.debt-note { font-size: 11px; color: var(--text-2); margin-top: 3px; font-style: italic; }

.debt-right { text-align: right; flex-shrink: 0; }
.debt-amount {
  font-family: 'Syne', sans-serif; font-weight: 800; font-size: 16px;
  color: var(--accent); line-height: 1;
}
.debt-item.type-take .debt-amount { color: var(--red); }
.debt-amount.paid-amt { text-decoration: line-through; color: var(--text-3) !important; }
.paid-badge {
  display: inline-block; margin-top: 4px;
  background: rgba(0,210,160,0.15); color: var(--accent);
  font-size: 9px; font-weight: 700; padding: 2px 8px; border-radius: 20px;
  letter-spacing: 0.06em;
}
.type-badge {
  display: inline-block; font-size: 9px; padding: 2px 6px; border-radius: 6px; font-weight: 700; margin-bottom: 4px;
}
.type-badge.give { background: var(--accent-dim); color: var(--accent); }
.type-badge.take { background: var(--red-dim); color: var(--red); }

/* ACTIONS */
.item-actions {
  display: flex; gap: 6px;
  border-top: 1px solid var(--sep); padding-top: 11px;
}
.act-btn {
  flex: 1; border: none; border-radius: 10px; padding: 8px 4px;
  font-size: 10px; font-weight: 700; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 4px;
  transition: all 0.2s; font-family: inherit; background: transparent;
  white-space: nowrap; letter-spacing: 0.02em;
}
.act-btn:hover { transform: translateY(-1px); }

.act-edit  { color: var(--warn);  background: rgba(255,179,71,0.08); }
.act-edit:hover  { background: rgba(255,179,71,0.18); }

.act-tg    { color: var(--tg);   background: var(--tg-dim); }
.act-tg:hover    { background: rgba(34,158,217,0.2); }

.act-pay   { color: var(--accent); background: var(--accent-dim); }
.act-pay:hover   { background: rgba(0,210,160,0.22); }
.act-pay.done { background: var(--accent); color: #08141e; }
.act-pay.done:hover { background: var(--accent-2); }

.act-del   { color: var(--red);  background: var(--red-dim); }
.act-del:hover   { background: rgba(255,79,79,0.2); }

/* ═══════════════════════════════════════
    MODAL (EDIT)
═══════════════════════════════════════ */
.modal-overlay {
  position: fixed; inset: 0;
  background: var(--modal-bg);
  backdrop-filter: blur(12px);
  display: flex; align-items: flex-end; justify-content: center;
  z-index: 500; opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal-sheet {
  background: var(--bg-mid); border: 1px solid var(--border-2);
  border-radius: 28px 28px 0 0; padding: 24px 20px 40px;
  width: 100%; max-width: 520px;
  transform: translateY(60px); transition: transform 0.35s cubic-bezier(.32,1,.4,1);
  box-shadow: 0 -16px 60px rgba(0,0,0,0.4);
}
.modal-overlay.open .modal-sheet { transform: translateY(0); }
.modal-handle { width: 36px; height: 4px; background: var(--sep); border-radius: 2px; margin: 0 auto 20px; }
.modal-title {
  font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800;
  color: var(--text); margin-bottom: 18px; display: flex; align-items: center; gap: 10px;
}
.modal-title i { color: var(--warn); }

/* ═══════════════════════════════════════
    EMPTY / SKELETON
═══════════════════════════════════════ */
.empty-wrap { text-align: center; padding: 50px 20px; }
.empty-icon { font-size: 48px; opacity: 0.18; margin-bottom: 14px; }
.empty-title { font-family: 'Syne'; font-size: 16px; font-weight: 700; color: var(--text-2); margin-bottom: 6px; }
.empty-sub { font-size: 13px; color: var(--text-3); }

.skeleton {
  height: 88px; border-radius: 20px; margin-bottom: 10px;
  background: linear-gradient(90deg, var(--sk1) 25%, var(--sk2) 50%, var(--sk1) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
}
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* ═══════════════════════════════════════
    TOAST
═══════════════════════════════════════ */
.toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px);
  padding: 11px 22px; border-radius: 50px;
  font-weight: 700; font-family: 'Syne'; font-size: 13px;
  opacity: 0; pointer-events: none; z-index: 999;
  transition: opacity 0.25s, transform 0.25s;
  white-space: nowrap; box-shadow: var(--shadow);
  display: flex; align-items: center; gap: 8px;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.ok  { background: var(--accent); color: #08141e; }
.toast.err { background: var(--red);    color: #fff; }
.toast.info{ background: var(--warn);   color: #08141e; }

/* ═══════════════════════════════════════
    SPINNER
═══════════════════════════════════════ */
.spin {
  width: 15px; height: 15px; border: 2px solid rgba(8,20,30,0.2);
  border-top-color: #08141e; border-radius: 50%;
  animation: rot 0.6s linear infinite; display: inline-block;
}
@keyframes rot { to { transform: rotate(360deg); } }

.section-gap { margin-bottom: 6px; }
</style>
</head>
<body>

<div class="modal-overlay" id="editModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title"><i class="fas fa-pen"></i> Qarzni Tahrirlash</div>

    <div class="field-full">
      <label class="field-label">Ism va Familiya</label>
      <input type="text" class="field-input" id="editName" placeholder="Ism va Familiya">
    </div>
    <div class="field-full">
      <label class="field-label">Telefon</label>
      <input type="text" class="field-input" id="editPhone" value="+998 ">
    </div>
    <div class="field-row">
      <div class="field-group">
        <label class="field-label">Turi</label>
        <select class="field-select" id="editType">
            <option value="give">Berdim</option>
            <option value="take">Oldim</option>
        </select>
      </div>
      <div class="field-group">
        <label class="field-label">Valyuta</label>
        <select class="field-select" id="editCurrency">
            <option value="UZS">UZS (so'm)</option>
            <option value="USD">USD ($)</option>
        </select>
      </div>
    </div>
    <div class="field-row">
      <div class="field-group">
        <label class="field-label">Summa</label>
        <input type="text" class="field-input" id="editAmount" placeholder="0">
      </div>
      <div class="field-group">
        <label class="field-label">Izoh</label>
        <input type="text" class="field-input" id="editNote" placeholder="Sabab...">
      </div>
    </div>

    <div class="btn-row">
      <button class="btn-cancel" id="editCancel"><i class="fas fa-times"></i> Bekor</button>
      <button class="btn-primary" id="editSave"><i class="fas fa-check"></i> Saqlash</button>
    </div>
  </div>
</div>

<div class="container">

  <div class="header">
    <div class="logo">
      <h1>Qarz<span>Daftari</span></h1>
      <span class="logo-sub">Pro Edition</span>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="refreshBtn" title="Yangilash"><i class="fas fa-rotate-right"></i></button>
      <button class="icon-btn" id="themeBtn" title="Kun/Tun rejimi"><i class="fas fa-moon"></i></button>
      <div class="conn-pill">
        <div class="conn-dot loading" id="connDot"></div>
        <span id="connText">Ulanmoqda</span>
      </div>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-icon">👥</div>
      <div class="stat-label">Qarzdorlar</div>
      <div class="stat-value" id="statCount">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">📈</div>
      <div class="stat-label">Haqqim (Bergan)</div>
      <div class="stat-value green" id="statTotalGive">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">📉</div>
      <div class="stat-label">Qarzi (Olgan)</div>
      <div class="stat-value red" id="statTotalTake">—</div>
    </div>
  </div>

  <div class="search-row">
    <div class="search-wrap">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInp" class="search-input" placeholder="Ism yoki telefon bo'yicha qidirish...">
    </div>
    <button class="icon-btn" id="exportBtn" title="Excel (CSV)ga yuklash"><i class="fas fa-file-csv"></i></button>
  </div>

  <div class="filter-tabs">
    <button class="tab-btn active" data-filter="all">Barchasi</button>
    <button class="tab-btn" data-filter="unpaid">Faol</button>
    <button class="tab-btn" data-filter="paid">To'langan</button>
  </div>

  <div class="form-card">
    <div class="form-title" id="formTitle">
        <div><i class="fas fa-plus-circle"></i> Yangi Qarz Qo'shish</div>
    </div>
    <div class="field-row">
      <div class="field-group">
        <label class="field-label">Ism va Familiya</label>
        <input type="text" class="field-input" id="inpName" placeholder="Ism Familiya">
      </div>
      <div class="field-group">
        <label class="field-label">Telefon</label>
        <input type="text" class="field-input" id="inpPhone" value="+998 ">
      </div>
    </div>
    <div class="field-row">
      <div class="field-group">
        <label class="field-label">Qarz turi</label>
        <select class="field-select" id="inpType">
            <option value="give">Berdim (Haqqim)</option>
            <option value="take">Oldim (Qarzim)</option>
        </select>
      </div>
      <div class="field-group">
        <label class="field-label">Valyuta</label>
        <select class="field-select" id="inpCurrency">
            <option value="UZS">UZS (so'm)</option>
            <option value="USD">USD ($)</option>
        </select>
      </div>
    </div>
    <div class="field-row">
      <div class="field-group">
        <label class="field-label">Summa</label>
        <input type="text" class="field-input" id="inpDebt" placeholder="0">
      </div>
      <div class="field-group">
        <label class="field-label">Izoh (ixtiyoriy)</label>
        <input type="text" class="field-input" id="inpNote" placeholder="Sabab...">
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-primary" id="addBtn">
        <i class="fas fa-plus"></i> Ro'yxatga Qo'shish
      </button>
    </div>
  </div>

  <div class="section-gap">
    <div class="list-section-label" id="listLabel">Barcha qarzlar</div>
    <div id="debtList"></div>
  </div>

</div>

<div id="toast" class="toast ok"></div>

<script>
// ══════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════
const API = 'https://qarz-3.onrender.com';

// ══════════════════════════════════════
//  ELEMENTS
// ══════════════════════════════════════
const $ = id => document.getElementById(id);
const inpName     = $('inpName');
const inpPhone    = $('inpPhone');
const inpType     = $('inpType');
const inpCurrency = $('inpCurrency');
const inpDebt     = $('inpDebt');
const inpNote     = $('inpNote');
const addBtn      = $('addBtn');
const searchInp   = $('searchInp');
const exportBtn   = $('exportBtn');
const debtList    = $('debtList');
const statCount   = $('statCount');
const statTotalGive = $('statTotalGive');
const statTotalTake = $('statTotalTake');
const listLabel   = $('listLabel');
const toast       = $('toast');
const connDot     = $('connDot');
const connText    = $('connText');
const themeBtn    = $('themeBtn');
const refreshBtn  = $('refreshBtn');
const editModal   = $('editModal');
const editName    = $('editName');
const editPhone   = $('editPhone');
const editType    = $('editType');
const editCurrency= $('editCurrency');
const editAmount  = $('editAmount');
const editNote    = $('editNote');
const editSave    = $('editSave');
const editCancel  = $('editCancel');

let allDebts = [];
let currentFilter = 'all';
let editIndex = null;

// ══════════════════════════════════════
//  THEME
// ══════════════════════════════════════
const savedTheme = localStorage.getItem('qd_theme') || 'dark';
if (savedTheme === 'light') applyLight();

function applyLight() {
  document.body.classList.add('light');
  themeBtn.innerHTML = '<i class="fas fa-sun"></i>';
}
function applyDark() {
  document.body.classList.remove('light');
  themeBtn.innerHTML = '<i class="fas fa-moon"></i>';
}
themeBtn.addEventListener('click', () => {
  const isLight = document.body.classList.contains('light');
  if (isLight) { applyDark(); localStorage.setItem('qd_theme','dark'); }
  else          { applyLight(); localStorage.setItem('qd_theme','light'); }
});

// ══════════════════════════════════════
//  UTILITY
// ══════════════════════════════════════
function fmt(n, cur = 'UZS') {
  return Number(n).toLocaleString('uz-UZ') + (cur === 'USD' ? " $" : " so'm");
}
function initials(name) {
  return (name||'').trim().split(/\s+/).map(w=>w[0]||'').join('').toUpperCase().slice(0,2) || '?';
}
function getTime() {
  return new Date().toLocaleString('uz-UZ', {
    day:'numeric', month:'short', year:'numeric',
    hour:'2-digit', minute:'2-digit'
  });
}
let toastTimer;
function showToast(msg, type='ok') {
  toast.textContent = msg;
  toast.className = `toast ${type} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2800);
}

// ══════════════════════════════════════
//  CONNECTION STATUS
// ══════════════════════════════════════
function setConn(state) {
  connDot.className = 'conn-dot ' + state;
  connText.textContent = { online:'Ulangan', offline:'Offline', loading:'Ulanmoqda' }[state] || state;
}

// ══════════════════════════════════════
//  INPUT MASKS
// ══════════════════════════════════════
function maskName(inp) {
  inp.addEventListener('input', e => {
    e.target.value = e.target.value.replace(/[^a-zA-Zа-яА-ЯёЁ\s']/g, '');
  });
}
function maskPhone(inp) {
  inp.addEventListener('input', e => {
    let v = e.target.value.replace(/\D/g,'');
    if (!v.startsWith('998')) v = '998' + v;
    v = v.slice(0,12);
    let r = '+998 ';
    if (v.length > 3) r += v.slice(3,5);
    if (v.length > 5) r += '-' + v.slice(5,8);
    if (v.length > 8) r += '-' + v.slice(8,10);
    if (v.length > 10) r += '-' + v.slice(10,12);
    e.target.value = r;
  });
  inp.addEventListener('keydown', e => {
    if (e.key === 'Backspace' && inp.value === '+998 ') e.preventDefault();
  });
}
function maskAmount(inp) {
  inp.addEventListener('input', e => {
    e.target.value = e.target.value.replace(/\D/g,'');
  });
}

maskName(inpName); maskName(editName);
maskPhone(inpPhone); maskPhone(editPhone);
maskAmount(inpDebt); maskAmount(editAmount);

// ══════════════════════════════════════
//  API
// ══════════════════════════════════════
async function apiFetch(url, opts={}) {
  const res = await fetch(API + url, opts);
  if (!res.ok) throw new Error(res.status);
  return res.json();
}

async function loadDebts() {
  setConn('loading');
  showSkeleton();
  try {
    allDebts = await apiFetch('/get_debts');
    setConn('online');
    render();
  } catch {
    setConn('offline');
    showToast('Server bilan bog\'lanishda xato!', 'err');
    debtList.innerHTML = `
      <div class="empty-wrap">
        <div class="empty-icon">📡</div>
        <div class="empty-title">Server javob bermadi</div>
        <div class="empty-sub">Sahifani yangilang yoki keyinroq urinib ko'ring</div>
      </div>`;
  }
}

async function apiAdd(debt) { return apiFetch('/add_debt',{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(debt) }); }
async function apiDelete(i) { return apiFetch(`/delete_debt/${i}`,{ method:'DELETE' }); }

// ══════════════════════════════════════
//  RENDER
// ══════════════════════════════════════
function showSkeleton() {
  debtList.innerHTML = [1,2,3].map(()=>`<div class="skeleton"></div>`).join('');
}

const filterLabels = { all:'Barcha qarzlar', unpaid:'To\'lanmagan faol', paid:"To'langan qarzlar" };

function render() {
  const term = searchInp.value.trim().toLowerCase();

  let list = allDebts.filter(d => {
    const nameMatch  = (d.name||'').toLowerCase().includes(term);
    const phoneMatch = (d.phone||'').includes(term);
    return nameMatch || phoneMatch;
  });

  if (currentFilter === 'unpaid') list = list.filter(d => !d.paid);
  if (currentFilter === 'paid')   list = list.filter(d =>  d.paid);

  listLabel.textContent = filterLabels[currentFilter] + ` (${list.length})`;

  // Multi-Currency Stats logic
  const activeList = allDebts.filter(d => !d.paid);
  
  let giveUZS = 0, giveUSD = 0, takeUZS = 0, takeUSD = 0;
  activeList.forEach(d => {
    const amt = Number(d.amount || 0);
    const cur = d.currency || 'UZS';
    if((d.type || 'give') === 'give') {
        if(cur === 'UZS') giveUZS += amt; else giveUSD += amt;
    } else {
        if(cur === 'UZS') takeUZS += amt; else takeUSD += amt;
    }
  });

  statCount.textContent = activeList.length;
  statTotalGive.textContent = giveUSD > 0 ? `${giveUSD.toLocaleString()} $ + ${giveUZS.toLocaleString()} UZS` : `${giveUZS.toLocaleString()} UZS`;
  statTotalTake.textContent = takeUSD > 0 ? `${takeUSD.toLocaleString()} $ + ${takeUZS.toLocaleString()} UZS` : `${takeUZS.toLocaleString()} UZS`;

  if (list.length === 0) {
    debtList.innerHTML = `
      <div class="empty-wrap">
        <div class="empty-icon">${term ? '🔍' : '📒'}</div>
        <div class="empty-title">${term ? 'Natija topilmadi' : 'Ro\'yxat bo\'sh'}</div>
        <div class="empty-sub">${term ? 'Boshqa kalit so\'z kiriting' : 'Yangi qarz qo\'shish uchun yuqoridagi formani to\'ldiring'}</div>
      </div>`;
    return;
  }

  debtList.innerHTML = '';
  list.forEach((d) => {
    const origIdx = allDebts.indexOf(d);
    const el = document.createElement('div');
    const isTake = d.type === 'take';
    el.className = 'debt-item' + (d.paid ? ' paid-item' : '') + (isTake ? ' type-take' : '');

    el.innerHTML = `
      <div class="item-top">
        <div class="avatar">${initials(d.name)}</div>
        <div class="debt-meta">
          <div class="debt-name">${d.name||'—'}</div>
          <div class="debt-phone">${d.phone||''}</div>
          <div><span class="type-badge ${isTake?'take':'give'}">${isTake?'OLDIM (Qarzim)':'BERDIM (Haqqim)'}</span></div>
          ${d.note ? `<div class="debt-note">💬 ${d.note}</div>` : ''}
          <div class="debt-time">${d.createdAt||''}</div>
        </div>
        <div class="debt-right">
          <div class="debt-amount ${d.paid?'paid-amt':''}">${fmt(d.amount, d.currency)}</div>
          ${d.paid ? '<span class="paid-badge">✓ TO\'LANDI</span>' : ''}
        </div>
      </div>
      <div class="item-actions">
        <button class="act-btn act-edit" onclick="openEdit(${origIdx})">
          <i class="fas fa-pen"></i> Tahrir
        </button>
        <button class="act-btn act-tg" onclick="sendTg(${origIdx})">
          <i class="fab fa-telegram-plane"></i> Yuborish
        </button>
        <button class="act-btn act-pay ${d.paid?'done':''}" onclick="togglePaid(${origIdx})">
          <i class="fas fa-${d.paid?'rotate-left':'check'}"></i> ${d.paid?"Qaytarish":"To'landi"}
        </button>
        <button class="act-btn act-del" onclick="removeDebt(${origIdx})">
          <i class="fas fa-trash"></i> O'chir
        </button>
      </div>`;
    debtList.appendChild(el);
  });
}

// ══════════════════════════════════════
//  FILTER TABS
// ══════════════════════════════════════
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});

// ══════════════════════════════════════
//  ADD DEBT
// ══════════════════════════════════════
addBtn.addEventListener('click', async () => {
  const name     = inpName.value.trim();
  const phone    = inpPhone.value.trim();
  const type     = inpType.value;
  const currency = inpCurrency.value;
  const amount   = inpDebt.value.trim();
  const note     = inpNote.value.trim();

  if (!name)         { showToast("Ism kiriting! ✍️", 'err'); inpName.focus(); return; }
  if (phone.length < 17) { showToast("To'liq telefon raqam kiriting! 📞", 'err'); inpPhone.focus(); return; }
  if (!amount || amount === '0') { showToast("Summa kiriting! 💵", 'err'); inpDebt.focus(); return; }

  const debt = { id: Date.now(), name, phone, type, currency, amount, note, createdAt: getTime(), paid: false };

  addBtn.disabled = true;
  addBtn.innerHTML = '<span class="spin"></span> Saqlanmoqda...';

  try {
    await apiAdd(debt);
    allDebts.unshift(debt);
    render();
    inpName.value = ''; inpPhone.value = '+998 '; inpDebt.value = ''; inpNote.value = '';
    showToast('Muvaffaqiyatli saqlandi! ✅', 'ok');
    setConn('online');
  } catch {
    showToast("Serverga saqlashda xato! Qayta urining.", 'err');
    setConn('offline');
  } finally {
    addBtn.disabled = false;
    addBtn.innerHTML = '<i class="fas fa-plus"></i> Ro\'yxatga Qo\'shish';
  }
});

// ══════════════════════════════════════
//  SEARCH & EXPORT CSV
// ══════════════════════════════════════
searchInp.addEventListener('input', render);

exportBtn.addEventListener('click', () => {
  if (allDebts.length === 0) { showToast("Yuklash uchun ma'lumot yo'q!", "err"); return; }
  let csv = 'Ism,Telefon,Turi,Valyuta,Summa,Izoh,Sana,Holati\n';
  allDebts.forEach(d => {
    csv += `"${d.name}","${d.phone}","${d.type === 'take' ? 'Oldim' : 'Berdim'}","${d.currency || 'UZS'}","${d.amount}","${d.note || ''}","${d.createdAt}","${d.paid ? 'Tolandi' : 'Tolanmagan'}"\n`;
  });
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.setAttribute("download", `Qarz_Daftari_${new Date().toISOString().slice(0,10)}.csv`);
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  showToast("Excel fayl yuklab olindi 📄", "ok");
});

// ══════════════════════════════════════
//  TOGGLE PAID
// ══════════════════════════════════════
window.togglePaid = async (idx) => {
  const prev = allDebts[idx].paid;
  allDebts[idx] = { ...allDebts[idx], paid: !prev };
  render();
  try {
    await apiDelete(idx);
    await apiAdd(allDebts[idx]);
    await loadDebts();
    showToast(allDebts[idx]?.paid ? "To'landi deb belgilandi ✅" : "Bekor qilindi ↩️", 'ok');
  } catch {
    allDebts[idx] = { ...allDebts[idx], paid: prev };
    render();
    showToast("Xato! Qayta urining.", 'err');
  }
};

// ══════════════════════════════════════
//  DELETE
// ══════════════════════════════════════
window.removeDebt = async (idx) => {
  const d = allDebts[idx];
  if (!confirm(`"${d.name}" — ${fmt(d.amount, d.currency)}\n\nUshbu qarzni o'chirishni tasdiqlaysizmi?`)) return;
  try {
    await apiDelete(idx);
    allDebts.splice(idx, 1);
    render();
    showToast("O'chirildi 🗑️", 'info');
  } catch {
    showToast("O'chirishda xato!", 'err');
  }
};

// ══════════════════════════════════════
//  EDIT MODAL
// ══════════════════════════════════════
window.openEdit = (idx) => {
  editIndex = idx;
  const d = allDebts[idx];
  editName.value     = d.name     || '';
  editPhone.value    = d.phone    || '+998 ';
  editType.value     = d.type     || 'give';
  editCurrency.value = d.currency || 'UZS';
  editAmount.value   = d.amount   || '';
  editNote.value     = d.note     || '';
  editModal.classList.add('open');
};
function closeEdit() { editModal.classList.remove('open'); editIndex = null; }
editCancel.addEventListener('click', closeEdit);
editModal.addEventListener('click', e => { if (e.target === editModal) closeEdit(); });

editSave.addEventListener('click', async () => {
  if (editIndex === null) return;
  const name     = editName.value.trim();
  const phone    = editPhone.value.trim();
  const type     = editType.value;
  const currency = editCurrency.value;
  const amount   = editAmount.value.trim();
  const note     = editNote.value.trim();

  if (!name)         { showToast("Ism kiriting! ✍️", 'err'); editName.focus(); return; }
  if (phone.length < 17) { showToast("To'liq telefon raqam kiriting! 📞", 'err'); editPhone.focus(); return; }
  if (!amount || amount === '0') { showToast("Summa kiriting! 💵", 'err'); editAmount.focus(); return; }

  const updatedDebt = { ...allDebts[editIndex], name, phone, type, currency, amount, note };

  editSave.disabled = true;
  editSave.innerHTML = '<span class="spin"></span> Saqlanmoqda...';

  try {
    await apiDelete(editIndex);
    await apiAdd(updatedDebt);
    await loadDebts();
    closeEdit();
    showToast('Muvaffaqiyatli yangilandi! 💾', 'ok');
  } catch {
    showToast("Saqlashda xato yuz berdi.", 'err');
  } finally {
    editSave.disabled = false;
    editSave.innerHTML = '<i class="fas fa-check"></i> Saqlash';
  }
});

// ══════════════════════════════════════
//  TELEGRAM MESSAGE SHARE
// ══════════════════════════════════════
window.sendTg = (idx) => {
  const d = allDebts[idx];
  if (!d) return;
  const direction = d.type === 'take' ? "Men olgan qarz (Qarzim) 📉" : "Men bergan qarz (Haqqim) 📈";
  const status = d.paid ? "✅ To'langan" : "🚨 To'lanmagan (Kutilmoqda)";
  
  const text = encodeURIComponent(
    `📌 *QARZ DAFTARI MA'LUMOTI*\n\n` +
    `👤 *Ism:* ${d.name}\n` +
    `📞 *Tel:* ${d.phone}\n` +
    `📊 *Turi:* ${direction}\n` +
    `💰 *Summa:* ${fmt(d.amount, d.currency)}\n` +
    `💬 *Izoh:* ${d.note || '—'}\n` +
    `📅 *Sana:* ${d.createdAt}\n` +
    `📈 *Holati:* ${status}\n\n` +
    `📱 _Qarz Daftari Pro tizimi barchasini nazorat qiladi._`
  );
  window.open(`https://t.me/share/url?url=${text}`, '_blank');
};

refreshBtn.addEventListener('click', loadDebts);
document.addEventListener('DOMContentLoaded', loadDebts);
</script>
</body>
</html>
